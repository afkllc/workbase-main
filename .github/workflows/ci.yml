name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npx expo-doctor
      - run: npx tsc --noEmit

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m compileall app
      - run: python -c "from app.main import app; print(app.title)"
      - run: |
          python - <<'PY'
          from app.main import app

          expected = {
              ("GET", "/health"),
              ("GET", "/api/templates"),
              ("GET", "/api/templates/{template_key}"),
              ("GET", "/api/inspections"),
              ("POST", "/api/inspections"),
              ("GET", "/api/inspections/{inspection_id}"),
              ("PATCH", "/api/inspections/{inspection_id}/sections"),
              ("PATCH", "/api/inspections/{inspection_id}/rooms/{room_id}/items"),
              ("POST", "/api/inspections/{inspection_id}/rooms/{room_id}/analyse-photo"),
              ("POST", "/api/inspections/{inspection_id}/rooms/{room_id}/video-scan"),
              ("POST", "/api/inspections/{inspection_id}/generate"),
              ("GET", "/api/reports/{inspection_id}"),
          }

          actual = {
              (method, route.path)
              for route in app.routes
              if route.path.startswith("/api") or route.path == "/health"
              for method in route.methods
              if method not in {"HEAD", "OPTIONS"}
          }

          missing = expected - actual
          if missing:
              raise SystemExit(f"Missing routes: {sorted(missing)}")
          PY
