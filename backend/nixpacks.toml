providers = ["python"]

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "python -m venv .venv",
  ".venv/bin/python -m pip install --upgrade pip",
  ".venv/bin/python -m pip install -r requirements.txt",
]

[start]
cmd = ".venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT"
